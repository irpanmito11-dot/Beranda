<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beranda</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;

background-image:
linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.55)),
url("Picsart_26-07-04_05-23-01-503.png");

background-size:cover;
background-position:center;
background-repeat:no-repeat;
background-attachment:fixed;
}

.box{
width:90%;
max-width:450px;
text-align:center;
}

.logo{
font-size:64px;
font-weight:bold;
color:white;
margin-bottom:30px;
}

.search{
display:flex;
background:rgba(40,40,40,.9);
border-radius:50px;
padding:16px 20px;
margin-bottom:25px;
}

.search input{
flex:1;
background:none;
border:none;
outline:none;
color:white;
font-size:18px;
}

.btns{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
}

.btns a{
text-decoration:none;
background:rgba(40,40,40,.9);
color:white;
padding:16px;
border-radius:18px;
font-size:18px;
}
</style>

</head>

<body>

<div class="box">

<div class="logo">Google</div>

<form action="https://www.google.com/search">
<div class="search">
<input name="q" placeholder="Telusuri Google...">
</div>
</form>

<div class="btns">
<a href="https://youtube.com">YouTube</a>
<a href="https://facebook.com">Facebook</a>
<a href="https://chatgpt.com">ChatGPT</a>
<a href="https://github.com">GitHub</a>
</div>

</div>

</body>
</html>
