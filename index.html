
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Google</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
margin:0;
height:100vh;
background:
linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.55)),
url('Picsart_26-07-04_05-23-01-503.png');
background-size:cover;
background-position:center;
background-attachment:fixed;
display:flex;
justify-content:center;
align-items:center;
color:white;
font-family:Arial,sans-serif;
}

.container{
width:90%;
max-width:500px;
text-align:center;
}

.logo{
font-size:60px;
font-weight:bold;
margin-bottom:30px;
}

.search{
display:flex;
background:#2b2b2b;
border-radius:50px;
padding:15px;
}

.search input{
background:none;
border:none;
outline:none;
color:white;
font-size:18px;
flex:1;
}

.shortcuts{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
margin-top:30px;
}

.item{
background:#2b2b2b;
padding:15px;
border-radius:20px;
text-decoration:none;
color:white;
}

.item:hover{
background:#3d3d3d;
}
</style>
</head>

<body>

<div class="container">

<div class="logo">Google</div>

<form action="https://www.google.com/search">
<div class="search">
<input type="text" name="q" placeholder="Telusuri Google...">
</div>
</form>

<div class="shortcuts">
<a class="item" href="https://youtube.com">YouTube</a>
<a class="item" href="https://facebook.com">Facebook</a>
<a class="item" href="https://chatgpt.com">ChatGPT</a>
<a class="item" href="https://github.com">GitHub</a>
</div>

</div>

</body>
</html>
